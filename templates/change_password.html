<!DOCTYPE html>
<html lang="en" id="htmlRoot" data-version="{{ version }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password - ThreatGate v{{ version }}</title>
    <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}" type="image/x-icon">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
    <script>
        (function() {
            var theme = localStorage.getItem('theme') || 'dark';
            document.documentElement.setAttribute('data-theme', theme);
        })();
    </script>
    <style>
        .pw-strength { height: 4px; border-radius: 2px; margin: -0.75rem 0 1.25rem 0; transition: width .3s, background .3s; }
        .pw-match-hint { font-size: 0.75rem; margin: -0.75rem 0 1rem 0; min-height: 1rem; }
        .pw-match-hint.ok  { color: var(--login-green); }
        .pw-match-hint.bad { color: var(--login-error-text); }
        .login-form input:disabled { opacity: 0.5; cursor: not-allowed; }
        .pw-lock-icon { font-size: 2.5rem; text-align: center; margin-bottom: 0.5rem; }
    </style>
</head>
<body>
    <div class="login-wrap">
        <div class="login-card">
            <div class="pw-lock-icon">&#128274;</div>
            <h1>Password Change <span class="login-badge">Required</span></h1>
            <p class="login-subtitle">For security, you must set a new password before continuing</p>

            {% if error %}
            <div class="login-error">{{ error }}</div>
            {% endif %}

            <form method="POST" action="{{ url_for('auth.change_password') }}" class="login-form" id="pwForm">
                <label for="old_password">Current Password</label>
                <input type="password" id="old_password" name="old_password" required
                       placeholder="••••••••" autocomplete="current-password" autofocus>

                <label for="new_password">New Password</label>
                <input type="password" id="new_password" name="new_password" required
                       placeholder="Minimum 8 characters" autocomplete="new-password" minlength="8">
                <div class="pw-strength" id="pwStrength"></div>

                <label for="confirm_password">Confirm New Password</label>
                <input type="password" id="confirm_password" name="confirm_password" required
                       placeholder="Re-enter new password" autocomplete="new-password" minlength="8">
                <div class="pw-match-hint" id="pwMatch"></div>

                <button type="submit" id="pwSubmit">Update Password</button>
            </form>
        </div>
        <p class="login-back">
            <a href="{{ url_for('auth.logout') }}">Sign out</a>
        </p>
    </div>

    <script>
    (function() {
        var np  = document.getElementById('new_password');
        var cp  = document.getElementById('confirm_password');
        var bar = document.getElementById('pwStrength');
        var hint = document.getElementById('pwMatch');
        var btn = document.getElementById('pwSubmit');

        function strength(pw) {
            var s = 0;
            if (pw.length >= 8)  s++;
            if (pw.length >= 12) s++;
            if (/[A-Z]/.test(pw) && /[a-z]/.test(pw)) s++;
            if (/\d/.test(pw))    s++;
            if (/[^A-Za-z0-9]/.test(pw)) s++;
            return s;
        }

        var colors = ['#ef4444','#f97316','#eab308','#22c55e','#00ff41'];

        function update() {
            var s = strength(np.value);
            var pct = np.value.length ? (s / 5 * 100) : 0;
            bar.style.width = pct + '%';
            bar.style.background = np.value.length ? colors[Math.max(0, s - 1)] : 'transparent';

            if (cp.value.length > 0) {
                if (cp.value === np.value) {
                    hint.textContent = '\u2713 Passwords match';
                    hint.className = 'pw-match-hint ok';
                } else {
                    hint.textContent = '\u2717 Passwords do not match';
                    hint.className = 'pw-match-hint bad';
                }
            } else {
                hint.textContent = '';
                hint.className = 'pw-match-hint';
            }
        }

        np.addEventListener('input', update);
        cp.addEventListener('input', update);

        document.getElementById('pwForm').addEventListener('submit', function(e) {
            if (np.value !== cp.value) {
                e.preventDefault();
                hint.textContent = '\u2717 Passwords do not match';
                hint.className = 'pw-match-hint bad';
                cp.focus();
                return;
            }
            if (np.value.length < 8) {
                e.preventDefault();
                bar.style.background = '#ef4444';
                np.focus();
                return;
            }
            btn.disabled = true;
            btn.textContent = 'Updating\u2026';
        });
    })();
    </script>
</body>
</html>
