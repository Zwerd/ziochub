{% extends "admin/base.html" %}
{% block title %}Users{% endblock %}

{% block admin_content %}
<div class="bg-tertiary rounded-xl border border-white/10 p-6 mb-6">
    <h3 class="text-lg font-semibold accent-blue mb-4">Create User</h3>
    <form id="createUserForm" class="space-y-4 max-w-3xl">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 items-end">
            <div>
                <label for="new_username" class="block text-sm font-semibold text-secondary mb-1">Username *</label>
                <input type="text" id="new_username" name="username" required minlength="2" placeholder="analyst1"
                       class="w-full px-3 py-2 rounded-lg bg-tertiary border border-white/10 text-primary focus:border-accent-green">
            </div>
            <div>
                <label for="new_password" class="block text-sm font-semibold text-secondary mb-1">Password *</label>
                <input type="password" id="new_password" name="password" required minlength="4" placeholder="••••••••"
                       class="w-full px-3 py-2 rounded-lg bg-tertiary border border-white/10 text-primary focus:border-accent-green">
            </div>
            <div>
                <label for="new_display_name" class="block text-sm font-semibold text-secondary mb-1">Display Name</label>
                <input type="text" id="new_display_name" name="display_name" placeholder="Analyst One"
                       class="w-full px-3 py-2 rounded-lg bg-tertiary border border-white/10 text-primary focus:border-accent-green">
            </div>
            <div class="flex items-center gap-2">
                <input type="checkbox" id="new_is_admin" name="is_admin" class="rounded border-white/20">
                <label for="new_is_admin" class="text-sm font-medium text-secondary">Admin</label>
            </div>
            <div>
                <button type="submit" class="px-4 py-2 rounded-lg font-semibold bg-cyan-600 hover:bg-cyan-500 text-white transition">Create User</button>
            </div>
        </div>
    </form>
    <div id="createMessage" class="mt-4 hidden text-sm"></div>
</div>

<div class="bg-tertiary rounded-xl border border-white/10 overflow-hidden">
    <h3 class="text-lg font-semibold accent-blue p-4 border-b border-white/10">Users</h3>
    <div class="overflow-x-auto">
        <table class="w-full border-collapse text-sm">
            <thead>
                <tr class="bg-tertiary/80">
                    <th class="border border-white/10 px-4 py-3 text-left font-semibold text-secondary w-14">Avatar</th>
                    <th class="border border-white/10 px-4 py-3 text-left font-semibold text-secondary">Username</th>
                    <th class="border border-white/10 px-4 py-3 text-left font-semibold text-secondary">Source</th>
                    <th class="border border-white/10 px-4 py-3 text-left font-semibold text-secondary">Admin</th>
                    <th class="border border-white/10 px-4 py-3 text-left font-semibold text-secondary">Last Login</th>
                    <th class="border border-white/10 px-4 py-3 text-left font-semibold text-secondary">Status</th>
                    <th class="border border-white/10 px-4 py-3 text-left font-semibold text-secondary">Actions</th>
                </tr>
            </thead>
            <tbody id="usersBody"></tbody>
        </table>
    </div>
</div>

<div id="avatarModal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-50">
    <div class="bg-tertiary rounded-xl border border-white/10 p-6 max-w-sm w-full mx-4 shadow-xl">
        <h3 class="text-lg font-semibold accent-blue mb-4">Profile picture</h3>
        <p class="text-sm text-secondary mb-2" id="avatarModalUsername"></p>
        <div class="flex flex-col items-center gap-4">
            <div id="avatarModalPreview" class="w-24 h-24 rounded-full overflow-hidden border-2 border-white/20 bg-black/20 flex items-center justify-center">
                <img id="avatarModalImg" src="" alt="" class="w-full h-full object-cover hidden">
                <span id="avatarModalPlaceholder" class="text-4xl text-secondary">👤</span>
            </div>
            <input type="file" id="avatarModalFile" accept="image/jpeg,image/png,image/gif,image/webp" class="text-sm text-secondary file:mr-2 file:py-1 file:px-3 file:rounded file:border-0 file:bg-cyan-600/30 file:text-cyan-400">
            <div class="flex flex-wrap gap-2 w-full">
                <button type="button" id="avatarModalUpload" class="flex-1 min-w-0 px-4 py-2 rounded-lg font-semibold bg-cyan-600 hover:bg-cyan-500 text-white transition">Upload</button>
                <button type="button" id="avatarModalRemove" class="px-4 py-2 rounded-lg font-semibold bg-slate-600 hover:bg-slate-500 text-white transition border border-white/10">Remove Photo</button>
                <button type="button" onclick="closeAvatarModal()" class="px-4 py-2 rounded-lg bg-tertiary border border-white/10 hover:border-accent-green transition">Close</button>
            </div>
        </div>
        <div id="avatarModalMessage" class="mt-3 hidden text-sm"></div>
    </div>
</div>

<div id="editModal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-50">
    <div class="bg-tertiary rounded-xl border border-white/10 p-6 max-w-md w-full mx-4 shadow-xl">
        <h3 class="text-lg font-semibold accent-blue mb-4">Edit User</h3>
        <form id="editUserForm" class="space-y-4">
            <input type="hidden" id="edit_user_id">
            <div>
                <label class="block text-sm font-semibold text-secondary mb-1">Username</label>
                <input type="text" id="edit_username" disabled class="w-full px-3 py-2 rounded-lg bg-tertiary border border-white/10 text-primary opacity-70">
            </div>
            <div>
                <label for="edit_display_name" class="block text-sm font-semibold text-secondary mb-1">Display Name</label>
                <input type="text" id="edit_display_name" class="w-full px-3 py-2 rounded-lg bg-tertiary border border-white/10 text-primary focus:border-accent-green">
            </div>
            <div>
                <label for="edit_password" class="block text-sm font-semibold text-secondary mb-1">New Password (leave blank to keep)</label>
                <input type="password" id="edit_password" placeholder="••••••••" class="w-full px-3 py-2 rounded-lg bg-tertiary border border-white/10 text-primary focus:border-accent-green">
            </div>
            <div class="flex items-center gap-2">
                <input type="checkbox" id="edit_is_admin" class="rounded border-white/20">
                <label for="edit_is_admin" class="text-sm font-medium text-secondary">Admin</label>
            </div>
            <div class="flex gap-2 pt-2">
                <button type="submit" class="px-4 py-2 rounded-lg font-semibold bg-cyan-600 hover:bg-cyan-500 text-white transition">Save</button>
                <button type="button" onclick="closeEditModal()" class="px-4 py-2 rounded-lg bg-tertiary border border-white/10 hover:border-accent-green transition">Cancel</button>
            </div>
        </form>
    </div>
</div>

<script>
async function loadUsers() {
    const res = await fetch('/api/admin/users');
    const data = await res.json();
    if (!data.success) return;
    const tbody = document.getElementById('usersBody');
    tbody.innerHTML = '';
    for (const u of data.users) {
        const tr = document.createElement('tr');
        const sourceClass = u.source === 'system' ? 'bg-orange-500/20 text-orange-300' : u.source === 'ldap' ? 'bg-purple-500/20 text-purple-300' : 'bg-green-500/20 text-green-400';
        const statusClass = u.is_active ? 'bg-green-500/20 text-green-400' : 'bg-slate-500/30 text-slate-400';
        const lastLogin = u.last_login_at ? new Date(u.last_login_at).toLocaleString() : 'N/A';
        const avatarHtml = u.avatar_url ? `<img src="${escapeHtml(u.avatar_url)}" alt="" class="w-10 h-10 rounded-full object-cover border border-white/10">` : '<span class="w-10 h-10 rounded-full bg-white/10 flex items-center justify-center text-lg text-secondary">👤</span>';
        tr.innerHTML = `
            <td class="border border-white/10 px-4 py-2">${avatarHtml}</td>
            <td class="border border-white/10 px-4 py-2"><strong class="text-primary">${escapeHtml(u.username)}</strong><br><small class="text-secondary">${escapeHtml(u.display_name)}</small></td>
            <td class="border border-white/10 px-4 py-2"><span class="px-2 py-0.5 rounded text-xs ${sourceClass}">${escapeHtml(u.source)}</span></td>
            <td class="border border-white/10 px-4 py-2">${u.is_admin ? '<span class="px-2 py-0.5 rounded text-xs bg-cyan-500/20 text-cyan-400">Admin</span>' : '-'}</td>
            <td class="border border-white/10 px-4 py-2 text-secondary text-xs">${escapeHtml(lastLogin)}</td>
            <td class="border border-white/10 px-4 py-2"><span class="px-2 py-0.5 rounded text-xs ${statusClass}">${u.is_active ? 'Active' : 'Inactive'}</span></td>
            <td class="border border-white/10 px-4 py-2">
                ${u.source === 'local' ? `<button type="button" class="edit-btn px-2 py-1 rounded text-xs font-medium bg-cyan-600/30 text-cyan-400 hover:bg-cyan-500/40 mr-1" data-id="${u.id}" data-username="${escapeHtml(u.username)}" data-display="${escapeHtml(u.display_name || u.username)}" data-admin="${u.is_admin}" data-avatar="${escapeHtml(u.avatar_url || '')}">Edit</button>` : ''}
                <button type="button" class="avatar-btn px-2 py-1 rounded text-xs font-medium bg-tertiary border border-white/10 hover:border-accent-green" data-id="${u.id}" data-username="${escapeHtml(u.username)}" data-avatar="${escapeHtml(u.avatar_url || '')}">Photo</button>
                ${u.source !== 'system' ? `<button type="button" class="toggle-btn px-2 py-1 rounded text-xs font-medium bg-tertiary border border-white/10 hover:border-accent-green" data-id="${u.id}" data-active="${u.is_active}">${u.is_active ? 'Deactivate' : 'Activate'}</button>` : '<span class="text-xs text-orange-400 italic">managed by MISP</span>'}
            </td>
        `;
        tbody.appendChild(tr);
    }
    document.querySelectorAll('.edit-btn').forEach(btn => {
        btn.addEventListener('click', () => openEditModal(btn.dataset));
    });
    document.querySelectorAll('.avatar-btn').forEach(btn => {
        btn.addEventListener('click', () => openAvatarModal(parseInt(btn.dataset.id), btn.dataset.username, btn.dataset.avatar || ''));
    });
    document.querySelectorAll('.toggle-btn').forEach(btn => {
        btn.addEventListener('click', () => toggleActive(parseInt(btn.dataset.id), btn.dataset.active === 'true'));
    });
}
function escapeHtml(s) { return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function openEditModal(d) {
    document.getElementById('edit_user_id').value = d.id;
    document.getElementById('edit_username').value = d.username;
    document.getElementById('edit_display_name').value = d.display || d.username;
    document.getElementById('edit_password').value = '';
    document.getElementById('edit_is_admin').checked = d.admin === 'true';
    document.getElementById('editModal').classList.remove('hidden');
    document.getElementById('editModal').style.display = 'flex';
}
function closeEditModal() {
    document.getElementById('editModal').classList.add('hidden');
    document.getElementById('editModal').style.display = 'none';
}
document.getElementById('editUserForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const id = document.getElementById('edit_user_id').value;
    const body = {
        display_name: document.getElementById('edit_display_name').value,
        is_admin: document.getElementById('edit_is_admin').checked
    };
    const pwd = document.getElementById('edit_password').value;
    if (pwd) body.password = pwd;
    const res = await fetch(`/api/admin/users/${id}`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
    const data = await res.json();
    if (data.success) { closeEditModal(); loadUsers(); } else appAlert({ title: 'Error', message: data.message || 'Failed' });
});
async function toggleActive(id, currentlyActive) {
    if (currentlyActive) {
        var ok = await appConfirm({ title: 'Deactivate User', message: 'Deactivate this user?', okText: 'Deactivate' });
        if (!ok) return;
    }
    const res = await fetch(`/api/admin/users/${id}/toggle-active`, { method: 'POST' });
    const data = await res.json();
    if (data.success) loadUsers();
    else appAlert({ title: 'Error', message: data.message || 'Failed' });
}
document.getElementById('createUserForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const msgEl = document.getElementById('createMessage');
    msgEl.style.display = 'none';
    const body = {
        username: document.getElementById('new_username').value.trim().toLowerCase(),
        password: document.getElementById('new_password').value,
        display_name: document.getElementById('new_display_name').value.trim() || document.getElementById('new_username').value.trim(),
        is_admin: document.getElementById('new_is_admin').checked
    };
    try {
        const res = await fetch('/api/admin/users', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
        const data = await res.json();
        msgEl.classList.remove('hidden');
        if (data.success) {
            msgEl.classList.add('text-green-400');
            msgEl.classList.remove('text-red-400');
            msgEl.textContent = 'User created.';
            document.getElementById('createUserForm').reset();
            loadUsers();
        } else {
            msgEl.classList.add('text-red-400');
            msgEl.classList.remove('text-green-400');
            msgEl.textContent = data.message || 'Failed.';
        }
    } catch (err) {
        msgEl.classList.remove('hidden');
        msgEl.classList.add('text-red-400');
        msgEl.textContent = 'Network error.';
    }
});
document.getElementById('editModal').addEventListener('click', function(e) {
    if (e.target === this) closeEditModal();
});

let avatarModalUserId = null;
function openAvatarModal(userId, username, avatarUrl) {
    avatarModalUserId = userId;
    document.getElementById('avatarModalUsername').textContent = 'User: ' + (username || '');
    const img = document.getElementById('avatarModalImg');
    const placeholder = document.getElementById('avatarModalPlaceholder');
    if (avatarUrl) {
        img.src = avatarUrl;
        img.classList.remove('hidden');
        placeholder.classList.add('hidden');
    } else {
        img.removeAttribute('src');
        img.classList.add('hidden');
        placeholder.classList.remove('hidden');
    }
    document.getElementById('avatarModalFile').value = '';
    document.getElementById('avatarModalMessage').classList.add('hidden');
    document.getElementById('avatarModal').classList.remove('hidden');
    document.getElementById('avatarModal').style.display = 'flex';
}
function closeAvatarModal() {
    document.getElementById('avatarModal').classList.add('hidden');
    document.getElementById('avatarModal').style.display = 'none';
    avatarModalUserId = null;
}
document.getElementById('avatarModal').addEventListener('click', function(e) {
    if (e.target === this) closeAvatarModal();
});
document.getElementById('avatarModalUpload').addEventListener('click', async function() {
    const fileInput = document.getElementById('avatarModalFile');
    if (!fileInput.files || !fileInput.files.length) {
        const msg = document.getElementById('avatarModalMessage');
        msg.textContent = 'Please select an image.';
        msg.classList.remove('hidden', 'text-green-400');
        msg.classList.add('text-amber-400');
        return;
    }
    const form = new FormData();
    form.append('file', fileInput.files[0]);
    const msg = document.getElementById('avatarModalMessage');
    msg.classList.add('hidden');
    try {
        const res = await fetch('/api/admin/users/' + avatarModalUserId + '/avatar', { method: 'POST', body: form });
        const data = await res.json();
        msg.classList.remove('hidden');
        if (data.success) {
            msg.classList.add('text-green-400');
            msg.classList.remove('text-amber-400', 'text-red-400');
            msg.textContent = data.message || 'Saved.';
            document.getElementById('avatarModalImg').src = data.avatar_url;
            document.getElementById('avatarModalImg').classList.remove('hidden');
            document.getElementById('avatarModalPlaceholder').classList.add('hidden');
            fileInput.value = '';
            loadUsers();
        } else {
            msg.classList.add('text-red-400');
            msg.classList.remove('text-green-400');
            msg.textContent = data.message || 'Upload failed.';
        }
    } catch (err) {
        msg.classList.remove('hidden', 'text-green-400');
        msg.classList.add('text-red-400');
        msg.textContent = 'Network error.';
    }
});
document.getElementById('avatarModalRemove').addEventListener('click', async function() {
    const msg = document.getElementById('avatarModalMessage');
    msg.classList.add('hidden');
    try {
        const res = await fetch('/api/admin/users/' + avatarModalUserId + '/avatar', { method: 'DELETE' });
        const data = await res.json();
        msg.classList.remove('hidden');
        if (data.success) {
            msg.classList.add('text-green-400');
            msg.classList.remove('text-amber-400', 'text-red-400');
            msg.textContent = data.message || 'Photo removed.';
            document.getElementById('avatarModalImg').classList.add('hidden');
            document.getElementById('avatarModalImg').removeAttribute('src');
            document.getElementById('avatarModalPlaceholder').classList.remove('hidden');
            document.getElementById('avatarModalFile').value = '';
            loadUsers();
        } else {
            msg.classList.add('text-red-400');
            msg.classList.remove('text-green-400');
            msg.textContent = data.message || 'Failed to remove photo.';
        }
    } catch (err) {
        msg.classList.remove('hidden', 'text-green-400');
        msg.classList.add('text-red-400');
        msg.textContent = 'Network error.';
    }
});

loadUsers();
</script>
{% endblock %}
